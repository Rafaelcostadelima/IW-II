<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios práticos de DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Exercício 2</h1>
    <p id="texto">Olá, pessoa!</p>
    <button onclick="saudacao()">Clique pra colocar seu nome</button>
    <div class="botao">
        <a href="pagina3.html">Próximo exercício</a>
    </div>
    <script>
        function saudacao(){
            let nome = prompt("Digite o seu nome: ")
            document.getElementById("texto").innerText = "Olá, " + nome + "!"
        }
    </script>
</body>
</html>
