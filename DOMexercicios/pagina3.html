<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios práticos de DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Exercício 3</h1>
    <form id="formulario">
        <label for="idade">Digite a sua idade</label> <br>
        <input type="number" id="idade">
        <button type="submit">Enviar</button>
    </form>
    <p id="resultado">Você é </p>
    <div class="botao">
        <a href="pagina4.html">Próximo exercício</a>
    </div>
    <script>
        const formulario = document.getElementById("formulario")
        const idadeinicial = document.getElementById("idade")
        const resultado = document.getElementById("resultado")
        
        formulario.addEventListener("submit", function(event){
            event.preventDefault()
            let idade = parseInt(idadeinicial.value)
            if (idade >= 18 && idade <= 120){
                resultado.innerText = "Você é maior de idade"
            } else if (idade > 120){
                resultado.innerText = "Você é de maior. Nunca vi ninguém com essa idade, mas tá bom"
            } else if (idade <= 0){
                resultado.innerText = "Valor da idade não pode ser igual a 0 ou menor que 0"
            } else{
                resultado.innerText = "Você é menor de idade"
            }
        })
    </script>
</body>
</html>
