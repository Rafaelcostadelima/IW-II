<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios práticos de DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="corpo">
    <h1>Exercício 5</h1>
    <h2><strong>Teste</strong></h2>
    <button id="botao" onclick="alternarModo()">Modo claro</button>
    <div class="botao">
        <a href="pagina6.html" id="proximo">Próximo exercício</a>
    </div>
    <script>
        function alternarModo(){
            let botao = document.getElementById("botao")
            let corpo = document.getElementById("corpo")
            let proximo = document.getElementById("proximo")

            if (botao.innerText === "Modo claro"){
                corpo.style.backgroundColor = "black"
                corpo.style.color = "white"
                botao.innerText = "Modo escuro"
                proximo.style.backgroundColor = "white"
                proximo.style.color = "black"
            } else{
                corpo.style.backgroundColor = "white"
                corpo.style.color = "black"
                botao.innerText = "Modo claro"
                proximo.style.backgroundColor = "black"
                proximo.style.color = "white"
            }
        }
    </script>
</body>
</html>
