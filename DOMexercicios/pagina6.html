<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios práticos de DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="corpo">
    <h1>Exercício 6</h1>
    <input type="text" placeholder="Digite aqui o seu item" id="item">
    <button id="botao">Adicionar a lista</button>
    <ul id="minhaLista"></ul>
    <div class="botao">
        <a href="pagina7.html">Próximo exercício</a>
    </div>
    <script>
        const item = document.getElementById("item")
        const botao = document.getElementById("botao")
        const minhaLista = document.getElementById("minhaLista")

        botao.addEventListener("click", function() {
            let texto = item.value.trim()
            if (texto !== "") {
                let novoItem = document.createElement("li")
                novoItem.innerText = texto
                minhaLista.appendChild(novoItem)
                item.value = ""
                item.focus()
            }
        })
    </script>
</body>
</html>
