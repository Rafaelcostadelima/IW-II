<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios práticos de DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="corpo">
    <h1>Exercício 9</h1>
    <form id="formulario">
        <label for="senha">Crie uma senha:</label>
        <br>
        <input type="text" id="senha">
        <button type="submit">Enviar</button>
    </form>
    <p id="resultado">Sua senha é: </p>
    <div class="botao">
        <a href="pagina10.html">Próximo exercício</a>
    </div>
    <script>
        const formulario = document.getElementById("formulario")
        const senhainicial = document.getElementById("senha")
        const resultado = document.getElementById("resultado")

        formulario.addEventListener("submit", function(event) {
            event.preventDefault()
            let senha = senhainicial.value
            if (senha.length >= 6) {
                resultado.innerText = "Sua senha é: válida"
            } else {
                resultado.innerText = "Sua senha é: inválida"
            }
        })
    </script>
</body>
</html>
